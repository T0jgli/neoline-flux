---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fluentbit-config
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
  interval: 30m0s
  path: ./infrastructure/fluentbit-config
  prune: true
  retryInterval: 2m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 3m0s
  wait: true
