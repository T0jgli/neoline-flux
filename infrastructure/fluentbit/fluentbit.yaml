apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: fluentbit
  namespace: flux-system
spec:
  interval: 10m
  url: https://fluent.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluentbit
  namespace: fluentbit
spec:
  interval: 10m
  targetNamespace: fluentbit
  releaseName: fluentbit
  chart:
    spec:
      chart: fluent-bit
      version: "0.57.3"
      sourceRef:
        kind: HelmRepository
        name: fluentbit
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: fluentbit-values
