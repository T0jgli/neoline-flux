apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: allow-neoline
  namespace: kube-system
spec:
  ipAllowList:
    sourceRange:
      # - 84.2.218.60/32
      - 0.0.0.0/0
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: global-ratelimit
  namespace: kube-system
spec:
  rateLimit:
    average: 100
    burst: 50
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: kube-system
spec:
  headers:
    customResponseHeaders:
      X-Frame-Options: "DENY"
      X-Content-Type-Options: "nosniff"
      X-XSS-Protection: "1; mode=block"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Strict-Transport-Security: "max-age=63072000; includeSubDomains; preload"
      Permissions-Policy: "geolocation=(),midi=(),sync-xhr=(),microphone=(),camera=(),magnetometer=(),gyroscope=(),fullscreen=(self),payment=()"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: secure-chain
  namespace: kube-system
spec:
  chain:
    middlewares:
      - name: security-headers
      - name: global-ratelimit
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: kube-system
spec:
  redirectScheme:
    scheme: https
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: edge-waf
  namespace: kube-system
spec:
  plugin:
    coraza:
      # Automatically includes the OWASP Core Rule Set
      crsEnabled: true
      directives:
        - SecRuleEngine On
        # Instead of 'Include @owasp_crs/crs-setup.conf', we use the direct settings:
        - SecAction "id:900030,phase:1,pass,nolog,setvar:tx.anomaly_score_blocking=on"
        - SecAction "id:900110,phase:1,pass,nolog,setvar:tx.paranoia_level=1"
        - SecAction "id:900111,phase:1,pass,nolog,setvar:tx.inbound_anomaly_score_threshold=5"
        - SecDefaultAction "phase:1,log,auditlog,deny,status:403"
        - SecDefaultAction "phase:2,log,auditlog,deny,status:403"
        # Only Include the specific attack logic files which are usually better mapped
        - Include @owasp_crs/REQUEST-942-APPLICATION-ATTACK-SQLI.conf
        - Include @owasp_crs/REQUEST-941-APPLICATION-ATTACK-XSS.conf
