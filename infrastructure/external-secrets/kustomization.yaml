apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: external-secrets

resources:
  - bitwarden.yaml
  - external-secrets.yaml
  - clustersecretstore.yaml
  - networkpolicy.yaml

configMapGenerator:
  - name: external-secrets-values
    files:
      - values.yaml=values.yaml

configurations:
  - kustomizeconfig.yaml
