apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: falcosecurity
  namespace: flux-system
spec:
  interval: 10m
  url: https://falcosecurity.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 10m
  targetNamespace: falco
  releaseName: falco
  chart:
    spec:
      chart: falco
      version: "v8.0.3"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: falco-values
