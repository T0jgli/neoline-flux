---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: kalandozas-tls
  namespace: kalandozas
spec:
  encryptedData:
    tls.crt: 
    tls.key: 
  template:
    metadata:
      name: kalandozas-tls
      namespace: kalandozas
    type: kubernetes.io/tls
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: kalandozas-env
  namespace: kalandozas
spec:
  encryptedData:
    NEXT_BASEURL: 
    NEXT_EMAIL_PASS: 
    NEXT_EMAIL_USER: 
    NEXT_FIREBASE_API_KEY: 
    NEXT_FIREBASE_APPID: 
    NEXT_FIREBASE_AUTH_DOMAIN: 
    NEXT_FIREBASE_MEASUREMENTID: 
    NEXT_FIREBASE_MESSAGESENDERID: 
    NEXT_FIREBASE_PROJECTID: 
    NEXT_FIREBASE_STORAGEBUCKET: 
    NEXT_PUBLIC_GOOGLE_GAID: 
    NEXT_PUBLIC_GOOGLE_MAPSKEY: 
    NEXT_TURNSTILE_SECRET: 
    TZ: 
  template:
    metadata:
      name: kalandozas-env
      namespace: kalandozas
    type: Opaque
