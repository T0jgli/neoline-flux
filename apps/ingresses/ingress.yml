apiVersion: v1
kind: Service
metadata:
  name: redirect-placeholder
spec:
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autobuszjegy-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-http"
    traefik.ingress.kubernetes.io/router.middlewares: |
      kube-system-redirect-https@kubernetescrd,
      ingresses-autobuszjegy-redirect@kubernetescrd
spec:
  tls:
    - hosts:
        - autobuszjegy.hu
      secretName: autobuszjegy-tls
  rules:
    - host: autobuszjegy.hu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redirect-placeholder
                port:
                  number: 80
---
