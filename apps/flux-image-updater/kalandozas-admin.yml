apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: kalandozas-admin
spec:
  image: registry.kvlk.hu/kalandozas-admin
  interval: 1m
  secretRef:
    name: regcred
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: kalandozas-admin-policy
spec:
  imageRepositoryRef:
    name: kalandozas-admin
  filterTags:
    pattern: "^(?P<run>[0-9]+)-[a-f0-9]+$"
    extract: "$run"
  policy:
    numerical:
      order: asc
