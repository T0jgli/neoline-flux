---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: contitrans-env
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  target:
    name: contitrans-env
  dataFrom:
    - extract:
        key: contitrans-contitrans-env
